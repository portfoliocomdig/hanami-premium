version: '3.9'

# Uso: no seu servidor (VPS), após configurar o DNS do domínio apontando
# para o IP do servidor e ajustar nginx/reverse-proxy.conf com seu domínio:
#
#   docker compose -f docker-compose.prod.yml up -d
#
# As imagens vêm prontas do GitHub Container Registry (publicadas pelo
# workflow .github/workflows/ci-cd.yml a cada push em main) — o servidor
# não precisa clonar o código nem instalar Node/npm, só ter Docker.

services:
  db:
    image: postgres:16-alpine
    container_name: hanami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - hanami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/portfoliocomdig/hanami-premium/backend:latest
    container_name: hanami-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      PAGBANK_API_URL: ${PAGBANK_API_URL}
      PAGBANK_TOKEN: ${PAGBANK_TOKEN}
      PUBLIC_API_URL: ${PUBLIC_API_URL}

  frontend:
    image: ghcr.io/portfoliocomdig/hanami-premium/frontend:latest
    container_name: hanami-frontend
    restart: unless-stopped
    depends_on:
      - backend

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: hanami-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot
    container_name: hanami-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renova o certificado automaticamente a cada 12h (não faz nada se ainda não venceu)
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  hanami_db_data:
  certbot_certs:
  certbot_www:
