server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Suporte a rotas do React Router (evita 404 em refresh de /entrar, /checkout etc.)
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
