server {
  listen 80;
  server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

  # Necessário para o Certbot validar o domínio antes de gerar o certificado SSL
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

  ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com.br/privkey.pem;

  # Front-end (container "frontend", já serve os arquivos via seu próprio Nginx interno)
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Back-end (container "backend", API Express)
  location /api/ {
    proxy_pass http://backend:3001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://backend:3001/health;
  }
}
